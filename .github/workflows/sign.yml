on:
  schedule:
    - cron: '4 16 * * *'
  workflow_dispatch:
name: Signing
jobs:
  signing-lab:
    name: Signing Labport
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          repository: 'Small-Ku/pwsh-anime-attendance'
      - name: Signing
        shell: pwsh
        run: |
          $env:CHECK_SECRET | Out-File -FilePath sign.json
          .\sign.ps1
        env:
          CHECK_SECRET: ${{ secrets.CHECK_SECRET }}
  signing-land:
    name: Signing Land
    uses: AEtherside/skland-daily-attendance/.github/workflows/schedule.yml@main
    with:
      repository: AEtherside/skland-daily-attendance
    secrets:
      SKLAND_TOKENS: ${{ secrets.SKLAND_TOKENS }}
      SKLAND_NOTIFICATION_URLS: ${{ secrets.SKLAND_NOTIFICATION_URLS }}
      MAX_RETRIES: ${{ secrets.SKLAND_MAX_RETRIES }}
      SKLAND_ANONYMOUS: ${{ secrets.SKLAND_ANONYMOUS }}