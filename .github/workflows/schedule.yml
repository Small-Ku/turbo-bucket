on:
  schedule:
    - cron: '2 */2 * * *'
  workflow_dispatch:
name: Excavator
jobs:
  excavate:
    name: Excavator
    runs-on: windows-latest
    permissions:
      contents: write
    outputs:
      before_sha: ${{ steps.before.outputs.sha }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Get Initial HEAD
        id: before
        run: echo "sha=$(git rev-parse HEAD)" >> $GITHUB_OUTPUT
      - name: Excavate
        uses: ScoopInstaller/GithubActions@main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SKIP_UPDATED: '1'

  biome-format:
    name: Biome Format
    needs: excavate
    uses: ./.github/workflows/biome-filter.yml
    with:
      before_sha: ${{ needs.excavate.outputs.before_sha }}
      push_branch: ${{ github.ref }}
    secrets:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
